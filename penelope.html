<title>Penelope</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&display=swap');

  :root {
    --bg: #fafaf8;
    --fg: #1a1a1a;
    --dim: #777;
    --ghost: #999;
    --accent: #1a1a1a;
    --serif: 'EB Garamond', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--serif);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── LOGO ── */
  #logo {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #888;
    user-select: none;
    font-weight: 500;
  }

  #eight {
    position: fixed;
    top: 18px;
    right: 28px;
    font-size: 22px;
    color: #999;
    font-weight: 700;
    user-select: none;
    opacity: 0.4;
    letter-spacing: 2px;
  }

  /* ── MAIN AREA ── */
  #arena {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 80px 40px 120px;
    overflow: hidden;
  }

  /* prophecy whisper */
  #prophecy {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-style: italic;
    color: var(--ghost);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 1.5s ease;
    text-align: center;
  }
  #prophecy.visible { opacity: 1; }

  /* word column */
  #column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
  }

  .word-line {
    font-size: 23px;
    font-weight: 400;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(12px);
    animation: word-arrive 0.8s ease forwards;
    text-align: center;
    line-height: 1.3;
  }

  .word-line.seed {
    font-weight: 700;
    font-size: 27px;
    color: var(--accent);
  }

  .word-line.step { color: var(--fg); }

  .word-line.final {
    font-weight: 700;
    font-size: 25px;
    border-bottom: 1px solid var(--dim);
    padding-bottom: 4px;
  }

  @keyframes word-arrive {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* step counter */
  .step-num {
    position: absolute;
    left: 28px;
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
  }

  /* ── METRICS (shown after chain completes) ── */
  #metrics {
    position: fixed;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ghost);
    text-align: center;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #metrics.visible { opacity: 1; }

  /* ── INPUT ── */
  #input-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid #ccc;
    background: var(--bg);
  }

  #input-bar input[type="text"] {
    background: none;
    border: none;
    border-bottom: 1px solid #bbb;
    outline: none;
    font-family: var(--serif);
    font-size: 15px;
    color: var(--fg);
    text-align: center;
    width: 400px;
    letter-spacing: 0.5px;
    padding-bottom: 2px;
  }
  #input-bar input[type="text"]::placeholder {
    color: #999;
    font-style: italic;
  }
  #input-bar input[type="text"]:focus {
    border-bottom-color: var(--fg);
  }

  #send-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    margin-left: 8px;
    color: #999;
    font-size: 20px;
    line-height: 1;
    transition: color 0.2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #send-btn:hover { color: var(--fg); }
  #send-btn:active { color: var(--fg); transform: scale(0.9); }
  #send-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── WAITING STATE ── */
  #waiting {
    font-size: 14px;
    color: var(--ghost);
    font-style: italic;
    letter-spacing: 1px;
  }

  /* ── MODE INDICATOR ── */
  #mode-indicator {
    position: fixed;
    top: 18px;
    left: 28px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ghost);
    user-select: none;
    opacity: 0.6;
    text-transform: uppercase;
  }
  #mode-indicator.trained { color: #4a7c59; opacity: 0.8; }

  /* ── WEIGHT LOAD BUTTON ── */
  #load-weights-btn {
    position: fixed;
    bottom: 62px;
    right: 28px;
    font-family: var(--serif);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ghost);
    background: none;
    border: 1px solid #ccc;
    padding: 3px 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s ease;
    user-select: none;
  }
  #load-weights-btn:hover { color: var(--fg); border-color: var(--fg); }
  #weight-file { display: none; }
</style>
</head>
<body>

<div id="logo">penelope</div>
<div id="eight">v7</div>
<div id="mode-indicator">field</div>
<div id="prophecy"></div>

<div id="arena">
  <div id="waiting">waiting</div>
  <div id="column"></div>
</div>

<div id="metrics"></div>

<button id="load-weights-btn">load weights</button>
<input type="file" id="weight-file" accept=".bin">

<div id="input-bar">

  <button id="send-btn" aria-label="send">&#x2192;</button>

function bpeEncode(text) {
  const lower = text.toLowerCase();
  const seq = [];
  for (let i = 0; i < lower.length && seq.length < 8192; i++) {
    seq.push(lower.charCodeAt(i));
  }
  let len = seq.length;
  for (let m = 0; m < BPE_MERGES; m++) {
    const left = BPE_TABLE[m][0];
    const right = BPE_TABLE[m][1];
    const newId = 256 + m;
    let j = 0;
    for (let i = 0; i < len; i++) {
      if (i < len - 1 && seq[i] === left && seq[i + 1] === right) {
        seq[j++] = newId;
        i++;
      } else {
        seq[j++] = seq[i];
      }
    }
    len = j;
  }
  return seq.slice(0, len);
}

// ── BPE DECODE TABLE ──
const bpeStrs = new Array(BPE_VOCAB).fill('');
const bpeStrLen = new Array(BPE_VOCAB).fill(0);
(function initBpeDecode() {
  for (let i = 0; i < 256; i++) {
    bpeStrs[i] = String.fromCharCode(i);
    bpeStrLen[i] = 1;
  }
  for (let m = 0; m < BPE_MERGES; m++) {
    const id = 256 + m;
    const left = BPE_TABLE[m][0];
    const right = BPE_TABLE[m][1];
    bpeStrs[id] = bpeStrs[left] + bpeStrs[right];
    bpeStrLen[id] = bpeStrs[id].length;
  }
})();

// Precomputed BPE encoding of each vocab word
const vocabBpe = VOCAB.map(w => bpeEncode(w));

// ── EXTENDED VOCAB ──
// Hardcoded 1984 words + BPE tokens that decode to whole words (min 3 chars, no stops, no suffixes)
const SUFFIX_FRAGMENTS = new Set(["ing","tion","ment","ness","ble","ful","ous","ive","ent","ant","ist","ity","ght","est","ter","ther","ted","ting","ally","ling"]);

const extVocab = []; // {word, bpeIds, fromHardcoded}
(function initExtVocab() {
  // 1. All 1984 hardcoded words
  for (let i = 0; i < NWORDS; i++) {
    extVocab.push({ word: VOCAB[i], bpeIds: vocabBpe[i], fromHardcoded: true });
  }
  // 2. BPE tokens that decode to whole alpha words
  const extSet = new Set(VOCAB);
  for (let t = 0; t < BPE_VOCAB; t++) {
    const s = bpeStrs[t];
    if (s.length < 3) continue;
    if (!/^[a-zA-Z]+$/.test(s)) continue;
    const lower = s.toLowerCase();
    if (extSet.has(lower)) continue;
    if (STOP.has(lower)) continue;
    if (SUFFIX_FRAGMENTS.has(lower)) continue;
    extSet.add(lower);
    extVocab.push({ word: lower, bpeIds: [t], fromHardcoded: false });
  }
})();

// ── Suffix stripping + greedy match ──
const SUFFIXES = [
  "ting","ning","ring","ling","ding","ping","bing","ging","ming","king",
  "sing","zing",
  "ing","ment","ness","tion","sion","able","ible","ence","ance",
  "eous","ious","ful","less","ize","ise","ous","ive","ity",
  "ly","er","ed","est","al","en","es","s"
];

const VOCAB_LENS = VOCAB.map(w => w.length);

function tryStem(word) {
  const wlen = word.length;
  for (const suffix of SUFFIXES) {
    const slen = suffix.length;
    if (wlen <= slen + 2) continue;
    if (!word.endsWith(suffix)) continue;
    const stem = word.slice(0, wlen - slen);
    let idx = VOCAB.indexOf(stem);
    if (idx >= 0) return idx;
    idx = VOCAB.indexOf(stem + 'e');
    if (idx >= 0) return idx;
    if (stem.length >= 3 && stem[stem.length - 1] === stem[stem.length - 2]) {
      idx = VOCAB.indexOf(stem.slice(0, -1));
      if (idx >= 0) return idx;
    }
  }
  return -1;
}

function greedyVocabMatch(word) {
  const wlen = word.length;
  const ids = [];
  let pos = 0;
  while (pos < wlen && ids.length < 8) {
    let best = -1, bestLen = 0;
    for (let v = 0; v < VOCAB.length; v++) {
      const vl = VOCAB_LENS[v];
      if (vl <= bestLen || vl > wlen - pos) continue;
      if (word.startsWith(VOCAB[v], pos)) {
        best = v;
        bestLen = vl;
      }
    }
    if (best >= 0 && bestLen >= 3) {
      ids.push(best);
      pos += bestLen;
    } else {
      pos++;
    }
  }
  return ids;
}

function tokenizeText(text) {
  const lower = text.toLowerCase();
  const ids = [];
  let pos = 0;
  while (pos < lower.length) {
    while (pos < lower.length && !/[a-z]/.test(lower[pos])) pos++;
    if (pos >= lower.length) break;
    const start = pos;
    while (pos < lower.length && /[a-z]/.test(lower[pos])) pos++;
    const word = lower.slice(start, pos);
    if (word.length < 2 || STOP.has(word)) continue;
    let idx = VOCAB.indexOf(word);
    if (idx >= 0) { ids.push(idx); continue; }
    idx = tryStem(word);
    if (idx >= 0) { ids.push(idx); continue; }
    const sub = greedyVocabMatch(word);
    for (const s of sub) {
      if (ids.length === 0 || ids[ids.length - 1] !== s) {
        ids.push(s);
      }
    }
  }
  return ids;
}

// ═══════════════════════════════════════════════════════════════
// RESONANCE ENGINE — 8-layer transformer (JS implementation)
//
// Matches penelope.c v7 forward pass exactly:
//   RMSNorm, RoPE, multi-head causal self-attention,
//   RRPRAM resonance with gated blend, SwiGLU FFN
// ═══════════════════════════════════════════════════════════════

let model = null; // null = field mode, object = trained mode

function silu(x) {
  return x > -20.0 ? x / (1.0 + Math.exp(-x)) : 0.0;
}

function rmsnorm(x, g, n) {
  let ss = 0;
  for (let i = 0; i < n; i++) ss += x[i] * x[i];
  ss = ss / n + 1e-5;
  const inv = 1.0 / Math.sqrt(ss);
  const out = new Float32Array(n);
  for (let i = 0; i < n; i++) out[i] = g[i] * x[i] * inv;
  return out;
}

function matmulMV(W, x, rows, cols) {
  // W[rows * cols] @ x[cols] -> out[rows]
  const out = new Float32Array(rows);
  for (let i = 0; i < rows; i++) {
    let s = 0;
    const off = i * cols;
    for (let j = 0; j < cols; j++) s += W[off + j] * x[j];
    out[i] = s;
  }
  return out;
}

function applyRope(q, k, seqLen, nHeads, headDim) {
  const thetaBase = 10000.0;
  for (let t = 0; t < seqLen; t++) {
    for (let h = 0; h < nHeads; h++) {
      const base = (t * nHeads + h) * headDim;
      for (let d = 0; d < headDim / 2; d++) {
        const freq = 1.0 / Math.pow(thetaBase, 2.0 * d / headDim);
        const cosF = Math.cos(t * freq);
        const sinF = Math.sin(t * freq);
        // rotate q
        const q0 = q[base + d], q1 = q[base + d + headDim / 2];
        q[base + d] = q0 * cosF - q1 * sinF;
        q[base + d + headDim / 2] = q0 * sinF + q1 * cosF;
        // rotate k
        const k0 = k[base + d], k1 = k[base + d + headDim / 2];
        k[base + d] = k0 * cosF - k1 * sinF;
        k[base + d + headDim / 2] = k0 * sinF + k1 * cosF;
      }
    }
  }
}

// Full forward pass: bpeIds[seqLen] -> logits[BPE_VOCAB]
function forward(m, bpeIds) {
  let S = bpeIds.length;
  if (S < 1) S = 1;
  if (S > MAX_SEQ) S = MAX_SEQ;

  // x: residual stream [S * DIM]
  const x = new Float32Array(S * DIM);
  // embed: tok_emb + pos_emb
  for (let t = 0; t < S; t++) {
    let tok = bpeIds[t];
    if (tok < 0 || tok >= BPE_VOCAB) tok = 0;
    for (let d = 0; d < DIM; d++)
      x[t * DIM + d] = m.tok_emb[tok * DIM + d] + m.pos_emb[t * DIM + d];
  }

  for (let l = 0; l < N_LAYERS; l++) {
    const lw = m.layers[l];

    // 1. h = rmsnorm(x, attn_norm) per position
    const h = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const xSlice = x.subarray(t * DIM, (t + 1) * DIM);
      const normed = rmsnorm(xSlice, lw.attn_norm, DIM);
      h.set(normed, t * DIM);
    }

    // 2. q, k, v projections per position
    const q = new Float32Array(S * DIM);
    const k = new Float32Array(S * DIM);
    const v = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const ht = h.subarray(t * DIM, (t + 1) * DIM);
      q.set(matmulMV(lw.wq, ht, DIM, DIM), t * DIM);
      k.set(matmulMV(lw.wk, ht, DIM, DIM), t * DIM);
      v.set(matmulMV(lw.wv, ht, DIM, DIM), t * DIM);
    }

    // 3. RoPE
    applyRope(q, k, S, N_HEADS, HEAD_DIM);

    // 4. Multi-head causal attention
    const scale = 1.0 / Math.sqrt(HEAD_DIM);
    const av = new Float32Array(S * DIM); // attention output

    for (let hd = 0; hd < N_HEADS; hd++) {
      for (let ti = 0; ti < S; ti++) {
        const qiBase = (ti * N_HEADS + hd) * HEAD_DIM;
        // compute scores
        const scores = new Float32Array(ti + 1);
        let maxs = -1e30;
        for (let tj = 0; tj <= ti; tj++) {
          const kjBase = (tj * N_HEADS + hd) * HEAD_DIM;
          let dot = 0;
          for (let d = 0; d < HEAD_DIM; d++) dot += q[qiBase + d] * k[kjBase + d];
          dot *= scale;
          scores[tj] = dot;
          if (dot > maxs) maxs = dot;
        }
        // softmax
        let sum = 0;
        for (let tj = 0; tj <= ti; tj++) {
          scores[tj] = Math.exp(scores[tj] - maxs);
          sum += scores[tj];
        }
        const invS = sum > 0 ? 1.0 / sum : 0;
        for (let tj = 0; tj <= ti; tj++) scores[tj] *= invS;

        // weighted sum of values
        const aviBase = (ti * N_HEADS + hd) * HEAD_DIM;
        for (let tj = 0; tj <= ti; tj++) {
          const a = scores[tj];
          if (a === 0) continue;
          const vjBase = (tj * N_HEADS + hd) * HEAD_DIM;
          for (let d = 0; d < HEAD_DIM; d++) av[aviBase + d] += a * v[vjBase + d];
        }
      }
    }

    // 5. Project through wo
    const qkvOut = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const avt = av.subarray(t * DIM, (t + 1) * DIM);
      qkvOut.set(matmulMV(lw.wo, avt, DIM, DIM), t * DIM);
    }

    // 6. RRPRAM resonance: rrp = h @ wr
    const rrp = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const ht = h.subarray(t * DIM, (t + 1) * DIM);
      rrp.set(matmulMV(lw.wr, ht, DIM, DIM), t * DIM);
    }

    // 7. Gated blend: softmax(gate[0], gate[1])
    const g0 = lw.gate[0], g1 = lw.gate[1];
    const gmax = Math.max(g0, g1);
    const e0 = Math.exp(g0 - gmax), e1 = Math.exp(g1 - gmax);
    const gsum = e0 + e1;
    const w0 = e0 / gsum, w1 = e1 / gsum;

    // 8. Residual: x = x + w0*qkvOut + w1*rrp
    for (let i = 0; i < S * DIM; i++)
      x[i] += w0 * qkvOut[i] + w1 * rrp[i];

    // 9. h2 = rmsnorm(x, ffn_norm)
    const h2 = new Float32Array(S * DIM);
    for (let t = 0; t < S; t++) {
      const xt = x.subarray(t * DIM, (t + 1) * DIM);
      h2.set(rmsnorm(xt, lw.ffn_norm, DIM), t * DIM);
    }

    // 10. SwiGLU FFN: x = x + w_down @ (silu(h2 @ w_gate) * (h2 @ w_up))
    for (let t = 0; t < S; t++) {
      const h2t = h2.subarray(t * DIM, (t + 1) * DIM);
      const fg = matmulMV(lw.w_gate, h2t, HDIM, DIM);
      const fu = matmulMV(lw.w_up, h2t, HDIM, DIM);
      const sw = new Float32Array(HDIM);
      for (let i = 0; i < HDIM; i++) sw[i] = silu(fg[i]) * fu[i];
      const fd = matmulMV(lw.w_down, sw, DIM, HDIM);
      for (let d = 0; d < DIM; d++) x[t * DIM + d] += fd[d];
    }
  }

  // Final: rmsnorm(x[last], final_norm) @ lm_head^T
  const xLast = x.subarray((S - 1) * DIM, S * DIM);
  const xn = rmsnorm(xLast, m.final_norm, DIM);
  const logits = matmulMV(m.lm_head, xn, BPE_VOCAB, DIM);
  return logits;
}

// BPE logits -> word scores (mean aggregation)
function bpeLogitsToWordScores(bpeLogits) {
  const scores = new Float32Array(extVocab.length);
  for (let w = 0; w < extVocab.length; w++) {
    const ew = extVocab[w];
    const bl = ew.bpeIds.length;
    let s = 0;
    for (let b = 0; b < bl; b++) {
      const tok = ew.bpeIds[b];
      if (tok >= 0 && tok < BPE_VOCAB) s += bpeLogits[tok];
    }
    scores[w] = bl > 0 ? s / bl : 0;
  }
  return scores;
}

// ═══════════════════════════════════════════════════════════════
// PEN7 BINARY WEIGHT LOADING
//
// Format: 32-byte header (8 int32s) + float32 weights
// Header: [magic=0x50454E37, BPE_VOCAB, NWORDS, DIM, HDIM, N_HEADS, N_LAYERS, MAX_SEQ]
// ═══════════════════════════════════════════════════════════════

async function loadWeightsPEN7(buffer) {
  const headerView = new DataView(buffer, 0, 32);
  const magic = headerView.getInt32(0, true);
  if (magic !== 0x50454E37) {
    throw new Error('Not a PEN7 file (magic=0x' + magic.toString(16) + ')');
  }
  const hBpeVocab = headerView.getInt32(4, true);
  const hNWords = headerView.getInt32(8, true);
  const hDim = headerView.getInt32(12, true);
  const hHDim = headerView.getInt32(16, true);
  const hNHeads = headerView.getInt32(20, true);
  const hNLayers = headerView.getInt32(24, true);
  const hMaxSeq = headerView.getInt32(28, true);

  if (hBpeVocab !== BPE_VOCAB || hNWords !== NWORDS || hDim !== DIM ||
      hHDim !== HDIM || hNHeads !== N_HEADS || hNLayers !== N_LAYERS || hMaxSeq !== MAX_SEQ) {
    throw new Error('Config mismatch: BV=' + hBpeVocab + ' V=' + hNWords +
      ' D=' + hDim + ' H=' + hHDim + ' NH=' + hNHeads + ' NL=' + hNLayers + ' S=' + hMaxSeq);
  }

  const floats = new Float32Array(buffer, 32);
  let offset = 0;

  function readFloats(n) {
    const arr = new Float32Array(n);
    arr.set(floats.subarray(offset, offset + n));
    offset += n;
    return arr;
  }

  const m = {};
  m.tok_emb = readFloats(BPE_VOCAB * DIM);
  m.pos_emb = readFloats(MAX_SEQ * DIM);
  m.final_norm = readFloats(DIM);
  m.lm_head = readFloats(BPE_VOCAB * DIM);

  m.layers = [];
  for (let l = 0; l < N_LAYERS; l++) {
    const lw = {};
    lw.attn_norm = readFloats(DIM);
    lw.wq = readFloats(DIM * DIM);
    lw.wk = readFloats(DIM * DIM);
    lw.wv = readFloats(DIM * DIM);
    lw.wo = readFloats(DIM * DIM);
    lw.wr = readFloats(DIM * DIM);
    lw.gate = readFloats(2);
    lw.ffn_norm = readFloats(DIM);
    lw.w_gate = readFloats(DIM * HDIM);
    lw.w_up = readFloats(DIM * HDIM);
    lw.w_down = readFloats(HDIM * DIM);
    m.layers.push(lw);
  }

  const totalParams = offset;
  console.log('PEN7 loaded: ' + totalParams + ' params (' + (totalParams * 4 / 1e6).toFixed(1) + 'MB)');
  return m;
}

// ═══════════════════════════════════════════════════════════════
// DARIO FIELD — co-occurrence, prophecy, destiny, trauma
// ═══════════════════════════════════════════════════════════════

const cooc = new Map();
const bigrams = new Map();
let destiny = new Array(8).fill(0);
let trauma = 0;
let prophecyTarget = null;
let prophecyAge = 0;
let totalSteps = 0;

function wordCategory(idx) {
  if (idx < 100) return 0;
  if (idx < 200) return 1;
  if (idx < 300) return 2;
  if (idx < 350) return 3;
  if (idx < 450) return 4;
  if (idx < 550) return 5;
  if (idx < 650) return 6;
  return 7;
}

function updateCooc(w1, w2) {
  const k = w1 < w2 ? w1+"|"+w2 : w2+"|"+w1;
  cooc.set(k, (cooc.get(k)||0) + 1);
}

function getCooc(w1, w2) {
  const k = w1 < w2 ? w1+"|"+w2 : w2+"|"+w1;
  return cooc.get(k) || 0;
}

function updateBigram(prev, next) {
  if (!bigrams.has(prev)) bigrams.set(prev, new Map());
  const m = bigrams.get(prev);
  m.set(next, (m.get(next)||0) + 1);
}

// ── KURAMOTO CHAMBERS ──
const chambers = { fear:0, love:0, rage:0, void_:0, flow:0, complex:0 };
const chamberDecay = { fear:0.95, love:0.95, rage:0.93, void_:0.96, flow:0.94, complex:0.97 };

function updateChambers(stepIdx) {
  const depth = stepIdx / STEPS;
  const phase = depth < 0.33 ? 0 : depth < 0.66 ? 1 : 2;
  if (phase === 0) chambers.flow += 0.05;
  if (phase === 1) chambers.fear += 0.04;
  if (phase === 2) chambers.void_ += 0.05;
  if (depth > 0.75) chambers.complex += 0.03;
  if (trauma > 0.3) chambers.rage += 0.04;

  const K = 0.02;
  const names = Object.keys(chambers);
  const old = {...chambers};
  for (const i of names)
    for (const j of names)
      if (i !== j) chambers[i] += K * Math.sin(old[j] - old[i]);

  for (const k of names) {
    chambers[k] *= chamberDecay[k] || 0.95;
    chambers[k] = Math.max(0, Math.min(1, chambers[k]));
  }
}

// ═══════════════════════════════════════════════════════════════
// DARIO EQUATION — selection mechanism (field mode)
// ═══════════════════════════════════════════════════════════════

function darioScore(candidate, context, prevWord, stepIdx) {
  const cidx = VOCAB.indexOf(candidate);
  if (cidx < 0) return -Infinity;

  const alpha_mod = 1 + 0.3*chambers.love - 0.2*chambers.rage + 0.1*chambers.flow;
  const beta_mod = 1 + 0.2*chambers.flow - 0.3*chambers.fear;
  const gamma_mod = 1 + 0.4*chambers.void_ + 0.2*chambers.complex;

  let B = 0;
  if (prevWord && bigrams.has(prevWord)) {
    const m = bigrams.get(prevWord);
    B = (m.get(candidate) || 0) / (Math.max(...m.values()) + 1);
  }

  let H = 0;
  for (const ctx of context) {
    H += getCooc(ctx, candidate) * (1 / (context.length - context.indexOf(ctx) + 1));
  }
  const h_max = Math.max(H, 1);
  H /= h_max;

  let F = 0;
  if (prophecyTarget && candidate === prophecyTarget) {
    F = 0.5 * Math.log(1 + prophecyAge);
  }

  const cat = wordCategory(cidx);
  let A = destiny[cat] / (Math.max(...destiny.map(Math.abs)) + 0.01);

  let T = 0;
  if (trauma > 0.3 && stepIdx > 6) {
    if (cidx >= 200 && cidx < 300) T = trauma * 1.5;
    if (cidx >= 450 && cidx < 550) T = trauma * 1.2;
    if (cidx >= 930 && cidx < 1000) T = trauma * 1.0;
  }

  let wormhole = 0;
  if (Math.random() < 0.08 && stepIdx > 3 && stepIdx < 10) {
    const jumpCat = Math.floor(Math.random() * 8);
    if (cat === jumpCat) wormhole = 0.5;
  }

  const vibes = [1.3, 1.1, 1.0, 0.9, 0.8, 0.7, 0.8, 0.9, 1.0, 0.8, 0.7, 1.4];
  const vibe = vibes[stepIdx] || 1.0;
  const tau = 0.7 + stepIdx * 0.08;

  const score = (B * 8 + alpha_mod * 0.3 * H + beta_mod * 0.15 * F +
                 gamma_mod * 0.25 * A + T + wormhole) * vibe / tau;
  return score;
}

// Dario overlay for trained mode: adds field scores on top of transformer word scores
function darioOverlay(wordScores, context, step) {
  const alpha_mod = 1 + 0.3*chambers.love - 0.2*chambers.rage + 0.1*chambers.flow;
  const gamma_mod = 1 + 0.4*chambers.void_ + 0.2*chambers.complex;

  const lastN = Math.min(context.length, 8);
  const start = context.length - lastN;

  for (let v = 0; v < NWORDS; v++) {
    // H: Hebbian
    let H = 0;
    for (let i = start; i < context.length; i++)
      H += getCooc(VOCAB[context[i]], VOCAB[v]);
    if (H > 1) H = 1;
    wordScores[v] += alpha_mod * 0.3 * H;

    // F: prophecy
    if (prophecyTarget && VOCAB[v] === prophecyTarget)
      wordScores[v] += 0.5 * Math.log(1.0 + prophecyAge);

    // A: destiny
    const cat = wordCategory(v);
    let dMax = 0.01;
    for (let i = 0; i < 8; i++) if (Math.abs(destiny[i]) > dMax) dMax = Math.abs(destiny[i]);
    wordScores[v] += gamma_mod * 0.25 * destiny[cat] / dMax;
  }
}

// ═══════════════════════════════════════════════════════════════
// SELECT WORD — field mode (Dario-only)
// ═══════════════════════════════════════════════════════════════

function selectWordField(context, prevWord, stepIdx, forbidden) {
  const scores = [];
  for (const w of VOCAB) {
    if (forbidden.has(w)) continue;
    scores.push({ word: w, score: darioScore(w, context, prevWord, stepIdx) });
  }

  const noise = 0.3 * (1 - stepIdx / STEPS);
  for (const s of scores) s.score += Math.random() * noise;

  scores.sort((a, b) => b.score - a.score);

  const k = Math.min(12, scores.length);
  const topk = scores.slice(0, k);
  const sum = topk.reduce((s, x) => s + Math.max(0, x.score), 0.001);
  let r = Math.random() * sum;
  for (const t of topk) {
    r -= Math.max(0, t.score);
    if (r <= 0) return t.word;
  }
  return topk[0].word;
}

// ═══════════════════════════════════════════════════════════════
// SELECT WORD — trained mode (transformer forward + Dario overlay)
// ═══════════════════════════════════════════════════════════════

function selectWordTrained(bpeBuf, contextIds, stepIdx, forbidden) {
  // Full transformer forward on BPE buffer
  const ids = bpeBuf.length > MAX_SEQ ? bpeBuf.slice(bpeBuf.length - MAX_SEQ) : bpeBuf;
  const bpeLogits = forward(model, ids);

  // BPE logits -> word scores for extended vocab
  const wordScores = bpeLogitsToWordScores(bpeLogits);

  // Apply Dario overlay on the NWORDS portion
  darioOverlay(wordScores, contextIds, stepIdx);

  // Filter forbidden, pick from extVocab (prefer hardcoded 1984)
  const candidates = [];
  for (let i = 0; i < extVocab.length; i++) {
    const ew = extVocab[i];
    if (forbidden.has(ew.word)) continue;
    candidates.push({ word: ew.word, score: wordScores[i], idx: i });
  }

  // top-k sampling
  candidates.sort((a, b) => b.score - a.score);
  const k = Math.min(16, candidates.length);
  const topk = candidates.slice(0, k);

  // softmax over top-k
  let maxScore = topk[0].score;
  let sumExp = 0;
  for (const t of topk) {
    t.prob = Math.exp(t.score - maxScore);
    sumExp += t.prob;
  }
  for (const t of topk) t.prob /= sumExp;

  // sample
  let r = Math.random();
  for (const t of topk) {
    r -= t.prob;
    if (r <= 0) return t.word;
  }
  return topk[0].word;
}

// ═══════════════════════════════════════════════════════════════
// EXTRACT KEY + PROPHECY
// ═══════════════════════════════════════════════════════════════

function extractKey(text) {
  const ids = tokenizeText(text);
  if (ids.length > 0) return VOCAB[ids[0]];
  const words = text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 1 && !STOP.has(w));
  if (words.length === 0) return text.toLowerCase().split(/\s+/)[0] || "silence";
  words.sort((a, b) => b.length - a.length);
  return words[0];
}

function makeProphecy(seedWord) {
  const idx = VOCAB.indexOf(seedWord);
  let cat = idx >= 0 ? wordCategory(idx) : 5;
  const deepCats = [2, 5, 7];
  const targetCat = deepCats[Math.floor(Math.random() * deepCats.length)];
  const catStart = [0,100,200,300,350,450,550,650][targetCat] || 450;
  const catEnd = [100,200,300,350,450,550,650,1984][targetCat] || 550;
  const target = VOCAB[catStart + Math.floor(Math.random() * (catEnd - catStart))];
  prophecyTarget = target;
  prophecyAge = 0;
  return target;
}

// ═══════════════════════════════════════════════════════════════
// RUN CHAIN
// ═══════════════════════════════════════════════════════════════

async function runChain(userText) {
  const column = document.getElementById('column');
  const metrics = document.getElementById('metrics');
  const prophecyEl = document.getElementById('prophecy');
  const waiting = document.getElementById('waiting');
  column.innerHTML = '';
  metrics.classList.remove('visible');
  prophecyEl.classList.remove('visible');
  if (waiting) waiting.style.display = 'none';

  const trained = model !== null;

  // BPE tokenize input
  const inputBpe = bpeEncode(userText);
  const inputIds = tokenizeText(userText);
  const inputWords = new Set(userText.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/));

  // seed = first word-level token, or fallback
  let seed;
  if (inputIds.length > 0) {
    seed = VOCAB[inputIds[0]];
  } else {
    const keyWord = extractKey(userText);
    seed = keyWord;
    if (!VOCAB.includes(seed)) {
      let best = null, bestScore = -1;
      for (const w of VOCAB) {
        let score = 0;
        if (w.includes(seed) || seed.includes(w)) score = 3;
        for (let i = 0; i < Math.min(w.length, seed.length); i++) {
          if (w[i] === seed[i]) score += 0.5;
          else break;
        }
        if (score > bestScore) { bestScore = score; best = w; }
      }
      if (best && bestScore > 0) seed = best;
      else seed = VOCAB[Math.floor(Math.random() * 200)];
    }
  }

  // prime Hebbian field
  for (let i = 1; i < inputIds.length; i++) {
    updateCooc(VOCAB[inputIds[i - 1]], VOCAB[inputIds[i]]);
  }

  // prophecy
  const prophesied = makeProphecy(seed);
  prophecyEl.textContent = 'destined: ' + prophesied;
  setTimeout(() => prophecyEl.classList.add('visible'), 300);

  // forbidden
  const forbidden = new Set([...inputWords, seed]);

  // show seed
  await showWord(column, seed, 'seed', 0);

  // BPE buffer
  const seedIdx = VOCAB.indexOf(seed);
  let bpeBuf = seedIdx >= 0 ? [...vocabBpe[seedIdx]] : [...inputBpe];
  let contextIds = seedIdx >= 0 ? [seedIdx] : [...inputIds];

  // 12 steps
  const chain = [seed];
  let prevWord = seed;
  let totalDebt = 0;

  for (let step = 0; step < STEPS; step++) {
    await sleep(1200 + step * 150);

    updateChambers(step);
    prophecyAge++;

    let word;
    if (trained) {
      word = selectWordTrained(bpeBuf, contextIds, step, forbidden);
    } else {
      word = selectWordField(chain, prevWord, step, forbidden);
    }

    chain.push(word);
    forbidden.add(word);

    // update field
    updateCooc(prevWord, word);
    updateBigram(prevWord, word);
    const widx = VOCAB.indexOf(word);
    if (widx >= 0) {
      const cat = wordCategory(widx);
      destiny[cat] = 0.3 * 1 + 0.7 * destiny[cat];
      contextIds.push(widx);
    }

    // prophecy debt
    if (word !== prophecyTarget) {
      totalDebt += 0.1 * Math.log(1 + prophecyAge);
    } else {
      totalDebt = Math.max(0, totalDebt - 1);
    }

    // trauma
    if (step > 7) trauma = Math.min(1, trauma + 0.1);
    trauma *= 0.97;

    // append BPE tokens
    const pickIdx = VOCAB.indexOf(word);
    if (pickIdx >= 0 && bpeBuf.length + vocabBpe[pickIdx].length < 8192) {
      bpeBuf.push(...vocabBpe[pickIdx]);
    } else {
      // extended vocab word — look it up
      const extIdx = extVocab.findIndex(e => e.word === word);
      if (extIdx >= 0 && bpeBuf.length + extVocab[extIdx].bpeIds.length < 8192) {
        bpeBuf.push(...extVocab[extIdx].bpeIds);
      }
    }

    // ingest into field
    for (const ctx of chain.slice(-4)) {
      updateCooc(ctx, word);
    }

    const cls = step === STEPS - 1 ? 'final' : 'step';
    await showWord(column, word, cls, step + 1);
    prevWord = word;
  }

  totalSteps += STEPS;

  // check prophecy
  const fulfilled = chain.includes(prophecyTarget);

  // metrics
  await sleep(600);
  const cats = chain.map(w => wordCategory(VOCAB.indexOf(w))).filter(c => c >= 0);
  const uniqueCats = new Set(cats).size;
  const modeStr = trained ? 'resonance' : 'field';
  metrics.innerHTML = 'mode ' + modeStr + ' · debt ' + totalDebt.toFixed(2) +
    ' · drift ' + uniqueCats + '/8 · bpe ' + bpeBuf.length +
    ' · prophecy ' + (fulfilled ? 'fulfilled' : 'unfulfilled');
  metrics.classList.add('visible');

  if (fulfilled) {
    prophecyEl.textContent = 'destined: ' + prophesied + ' \u2713';
  } else {
    prophecyEl.textContent = 'destined: ' + prophesied + ' \u2014 unfulfilled';
  }
}

function showWord(container, word, cls, stepNum) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = 'word-line ' + cls;
    div.textContent = word;
    container.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    setTimeout(resolve, 100);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════════════════════
// WEIGHT LOADING UI
// ═══════════════════════════════════════════════════════════════

const weightFileInput = document.getElementById('weight-file');
const loadWeightsBtn = document.getElementById('load-weights-btn');
const modeIndicator = document.getElementById('mode-indicator');

loadWeightsBtn.addEventListener('click', () => {
  weightFileInput.click();
});

weightFileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadWeightsBtn.textContent = 'loading...';
  loadWeightsBtn.disabled = true;
  try {
    const buffer = await file.arrayBuffer();
    model = await loadWeightsPEN7(buffer);
    modeIndicator.textContent = 'resonance';
    modeIndicator.classList.add('trained');
    loadWeightsBtn.textContent = 'weights loaded';
    loadWeightsBtn.style.color = '#4a7c59';
    loadWeightsBtn.style.borderColor = '#4a7c59';
    document.getElementById('eight').textContent = 'v7';
  } catch (err) {
    console.error('Weight load error:', err);
    loadWeightsBtn.textContent = 'error: ' + err.message;
    loadWeightsBtn.style.color = '#c44';
    loadWeightsBtn.disabled = false;
    model = null;
  }
});

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════

const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
let running = false;

async function submit() {
  if (running) return;
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  running = true;

  await runChain(text);

  running = false;
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
sendBtn.addEventListener('click', submit);

inputEl.focus();
